<!DOCTYPE html>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

body{
font-family:'Poppins',sans-serif;
background:#0f172a;
color:#e2e8f0;
margin:0;
}

nav{
display:flex;
justify-content:space-between;
padding:20px 60px;
background:#020617;
}

.logo{
color:#6366f1;
font-size:22px;
font-weight:700;
}

.nav-links{
display:flex;
gap:30px;
list-style:none;
}

.nav-links a{
text-decoration:none;
color:#cbd5f5;
}

.container{
padding:80px;
}

.contact-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:40px;
}

.card{
background:#1e293b;
padding:35px;
border-radius:12px;
}

input,textarea{
width:100%;
padding:12px;
margin-bottom:15px;
border:none;
border-radius:6px;
}

button{
background:#6366f1;
border:none;
padding:12px 25px;
color:white;
border-radius:6px;
cursor:pointer;
}

footer{
background:#020617;
text-align:center;
padding:30px;
margin-top:60px;
}

@media(max-width:768px){
.contact-grid{
grid-template-columns:1fr;
}
}

</style>

<body>

<nav>

<div class="logo">TechAcademy</div>

<div class="contact-grid">

<div class="card">

<h3>Send Message</h3>

<input type="text" placeholder="Name">
<input type="email" placeholder="Email">
<textarea rows="5" placeholder="Message"></textarea>

<button>Submit</button>

</div>

<div class="card">

<h3>Department Office</h3>

<p>Science Building B</p>
<p>Room 402</p>
